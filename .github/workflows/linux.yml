name: Linux

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: write # for actions/upload-release-asset to upload release asset
    runs-on: ubuntu-latest

    env:
      PROJECT_RELEASE_PATH: ${{ github.event.repository.name }}_dev_linux_x64
      RAYLIB_VERSION: '6.0'
      RAYLIB_PATH: raylib-6.0_linux_amd64

    steps:
    - name: Checkout this repo
      uses: actions/checkout@master

    - name: Setup Release Paths
      run: echo "PROJECT_RELEASE_PATH=${{ env.PROJECT_NAME }}_v${{ github.event.release.tag_name }}_linux_x64" >> "$GITHUB_ENV"
      if: github.event_name == 'release' && github.event.action == 'published'

    - name: Setup Environment
      run: |
        sudo apt-get install -y --no-install-recommends libx11-dev
        pip install meson
        curl -OL "https://github.com/raysan5/raylib/releases/download/$RAYLIB_VERSION/$RAYLIB_PATH.tar.gz"
        tar xvf "$RAYLIB_PATH.tar.gz"

    - name: Build Product
      run: |
        meson setup build -D raylib_path=${{ env.RAYLIB_PATH }} -D prefix=/
        meson compile -C build -v --ninja-args '-k 0'

    - name: Run tests
      run: meson test -C build -v

    - name: Generate Artifacts
      run: |
        meson install -C build --destdir ../${{ env.PROJECT_RELEASE_PATH }}
        tar cavf ${{ env.PROJECT_RELEASE_PATH }}.tar.xz ${{ env.PROJECT_RELEASE_PATH }}

    - name: Upload Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.PROJECT_RELEASE_PATH }}.tar.xz
        path: ${{ env.PROJECT_RELEASE_PATH }}.tar.xz
        archive: false

    - name: Upload Artifact to Release
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ env.PROJECT_RELEASE_PATH }}.tar.xz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      if: github.event_name == 'release' && github.event.action == 'published'
