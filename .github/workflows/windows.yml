name: Windows

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "**/*.c"
      - "**/*.h"
      - ".github/workflows/windows.yml"
      - "Makefile"
      - "assets/**"
  pull_request:
    branches: [main]
    paths:
      - "**/*.c"
      - "**/*.h"
      - ".github/workflows/windows.yml"
      - "Makefile"
      - "assets/**"
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: write # for actions/upload-release-asset to upload release asset
    runs-on: windows-latest

    env:
      PROJECT_RELEASE_PATH: ${{ github.event.repository.name }}_dev_win_x64
      RAYLIB_VERSION: 5.5
      RAYLIB_PATH: raylib-5.5_win64_mingw-w64
      PKG_CONFIG_PATH: C:\vcpkg\packages\x64-windows\lib\pkgconfig

    steps:
      - name: Checkout this repo
        uses: actions/checkout@master

      - name: Setup Release Paths
        run: |
          echo "PROJECT_RELEASE_PATH=${{ env.PROJECT_NAME }}_v${{ github.event.release.tag_name }}_win_x64" >> "$GITHUB_ENV"
        if: github.event_name == 'release' && github.event.action == 'published'

      - name: Setup Environment
        run: |
          pip install meson pkgconf
          curl -OL "https://github.com/raysan5/raylib/releases/download/$RAYLIB_VERSION/$RAYLIB_PATH.zip"
          7z x "$RAYLIB_PATH.zip"
        shell: bash

      - name: Build Product
        run: |
          meson setup build -D raylib_path=${{ env.RAYLIB_PATH }}
          meson compile -C build -v

      - name: Run tests
        run: meson test -C build

      - name: Generate Artifacts
        run: |
          meson install -C build --destdir ..\${{ env.PROJECT_RELEASE_PATH }}
          7z a .\${{ env.PROJECT_RELEASE_PATH }}.zip .\${{ env.PROJECT_RELEASE_PATH }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PROJECT_RELEASE_PATH }}.zip
          path: ./${{ env.PROJECT_RELEASE_PATH }}.zip

      - name: Upload Artifact to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PROJECT_RELEASE_PATH }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: github.event_name == 'release' && github.event.action == 'published'
