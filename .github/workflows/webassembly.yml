name: WebAssembly

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: read

env:
  PROJECT_RELEASE_PATH: ${{ github.event.repository.name }}_dev_wasm
  RAYLIB_SRC_PATH: raylib/src
  PLATFORM: PLATFORM_WEB
  EM_CACHE_FOLDER: 'emsdk-cache'

jobs:
  build:
    permissions:
      contents: write # for actions/upload-release-asset & GitHub Pages
    runs-on: ubuntu-latest

    steps:
    - name: Checkout this repo
      uses: actions/checkout@master

    - name: Checkout raylib repo
      uses: actions/checkout@master
      with:
        repository: raysan5/raylib
        path: raylib

    - name: Setup cache
      id: cache-system-libraries
      uses: actions/cache@v5
      with:
        path: ${{env.EM_CACHE_FOLDER}}
        key: ${{env.EM_VERSION}}-${{ runner.os }}

    - uses: emscripten-core/setup-emsdk@v16
      with:
        actions-cache-folder: ${{env.EM_CACHE_FOLDER}}

    - name: Setup Release Paths
      run: |
        echo "PROJECT_RELEASE_PATH=${{ env.PROJECT_NAME }}_v${{ github.event.release.tag_name }}_wasm" >> "$GITHUB_ENV"
      if: github.event_name == 'release' && github.event.action == 'published'

    - name: Setup Environment
      run: pip install meson

    - name: Build raylib Library
      run: |
        cd "$RAYLIB_SRC_PATH"
        emcc -v
        make RAYLIB_BUILD_MODE=RELEASE RAYLIB_LIBTYPE=STATIC RAYLIB_RELEASE_PATH=. -B -j "$(nproc)"

    - name: Build Product
      run: |
        meson setup build -D raylib_src_path=${{ env.RAYLIB_SRC_PATH }} --cross-file wasm.ini
        meson compile -C build -v --ninja-args '-k 0'

    - name: Generate Artifacts
      run: |
        mkdir -p ${{ env.PROJECT_RELEASE_PATH }}
        cp src/index.html ${{ env.PROJECT_RELEASE_PATH }}
        cp build/game/*.{html,js,wasm,data} ${{ env.PROJECT_RELEASE_PATH }}
        7z a ./${{ env.PROJECT_RELEASE_PATH }}.zip ./${{ env.PROJECT_RELEASE_PATH }}

    - name: Upload Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.PROJECT_RELEASE_PATH }}.zip
        path: ./${{ env.PROJECT_RELEASE_PATH }}.zip
        archive: false

    - name: Upload Artifact to Release
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ env.PROJECT_RELEASE_PATH }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      if: github.event_name == 'release' && github.event.action == 'published'

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    permissions:
      contents: write # for GitHub Pages
      pages: write # for GitHub Pages
      id-token: write # for GitHub Pages

    concurrency:
      group: "pages"
      cancel-in-progress: false

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Download Artifacts
        uses: actions/download-artifact@v5
        with:
          name: ${{ env.PROJECT_RELEASE_PATH }}.zip
      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./${{ env.PROJECT_RELEASE_PATH }}
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
